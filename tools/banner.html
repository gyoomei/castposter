<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin:0; width:1200px; height:800px; overflow:hidden; background:#070816; }
    body { font-family: Inter, Arial, sans-serif; color:#f8fafc; }
    .canvas { position:relative; width:1200px; height:800px; overflow:hidden; background:
      radial-gradient(circle at 18% 18%, rgba(85,231,255,.28), transparent 250px),
      radial-gradient(circle at 82% 28%, rgba(255,91,215,.28), transparent 280px),
      radial-gradient(circle at 60% 106%, rgba(124,58,237,.38), transparent 340px),
      linear-gradient(145deg,#070816 0%,#10152c 58%,#050711 100%); }
    .grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px); background-size:42px 42px; mask-image:radial-gradient(circle at 55% 52%, black, transparent 78%); }
    .glow { position:absolute; width:560px; height:560px; right:20px; top:100px; border-radius:50%; background:conic-gradient(from 120deg,#55e7ff,#ff5bd7,#ffd166,#55e7ff); filter:blur(44px); opacity:.34; }
    .left { position:absolute; left:78px; top:86px; width:550px; }
    .tag { display:inline-block; padding:13px 18px; border:1px solid rgba(85,231,255,.34); border-radius:999px; color:#a5f3fc; background:rgba(8,145,178,.13); font-weight:900; letter-spacing:.12em; font-size:18px; }
    h1 { margin:34px 0 22px; font-size:96px; line-height:.86; letter-spacing:-.08em; font-weight:950; }
    p { margin:0; width:480px; color:#b9c4da; font-size:30px; line-height:1.28; font-weight:650; }
    .cta { margin-top:52px; display:inline-flex; align-items:center; gap:14px; padding:20px 26px; border-radius:24px; color:#08111f; background:linear-gradient(135deg,#55e7ff,#a78bfa 52%,#ff5bd7); font-size:25px; font-weight:950; box-shadow:0 26px 64px rgba(85,231,255,.26); }
    .card { position:absolute; right:106px; top:90px; width:378px; height:535px; border-radius:44px; padding:34px; background:
      linear-gradient(160deg,rgba(255,255,255,.18),rgba(255,255,255,.045)),
      radial-gradient(circle at 28% 20%,rgba(85,231,255,.34),transparent 38%),
      radial-gradient(circle at 84% 78%,rgba(255,91,215,.34),transparent 38%),#11172e; border:1px solid rgba(255,255,255,.24); box-shadow:0 42px 120px rgba(0,0,0,.52),0 0 90px rgba(85,231,255,.18); transform:rotate(7deg); }
    .line { display:flex; justify-content:space-between; gap:16px; }
    .pill { padding:12px 14px; border-radius:999px; background:rgba(0,0,0,.24); color:#dffbff; font-size:16px; font-weight:950; letter-spacing:.09em; }
    .quote { margin-top:105px; font-size:55px; line-height:1.08; letter-spacing:-.055em; font-weight:950; }
    .foot { position:absolute; left:34px; right:34px; bottom:34px; display:flex; justify-content:space-between; color:#cbd5e1; font-size:18px; font-weight:850; }
    .orb { position:absolute; border-radius:50%; width:18px; height:18px; background:#55e7ff; box-shadow:0 0 30px #55e7ff; }
    .o1 { right:520px; top:150px; } .o2 { right:72px; top:320px; background:#ff5bd7; box-shadow:0 0 30px #ff5bd7; } .o3 { right:390px; bottom:112px; background:#ffd166; box-shadow:0 0 30px #ffd166; }
    .brand { position:absolute; left:82px; bottom:64px; color:rgba(255,255,255,.42); font-size:20px; font-weight:800; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div><div class="glow"></div>
    <div class="left">
      <div class="tag">FARCASTER · BASE NFT</div>
      <h1>Cast<br>to NFT</h1>
      <p>Turn any Farcaster cast into a premium collectible moment.</p>
      <div class="cta">Create Cast NFT →</div>
    </div>
    <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
    <div class="card">
      <div class="line"><span class="pill">CAST NFT</span><span class="pill">#A7F2</span></div>
      <div class="quote">“Mint the moment.”</div>
      <div class="foot"><span>@caster</span><span>Base</span></div>
    </div>
    <div class="brand">CastMint</div>
  </div>
</body>
</html>
