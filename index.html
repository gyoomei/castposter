<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CastMint — Cast to NFT</title>
  <meta name="description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:title" content="CastMint — Cast to NFT">
  <meta property="og:description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:image" content="https://castposter.vercel.app/og.png?v=7">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://castposter.vercel.app/">

  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=7","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://castposter.vercel.app/?v=7","splashImageUrl":"https://castposter.vercel.app/icon.png?v=7","splashBackgroundColor":"#070816"}}}' />
  <meta name="fc:frame" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=7","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://castposter.vercel.app/?v=7","splashImageUrl":"https://castposter.vercel.app/icon.png?v=7","splashBackgroundColor":"#070816"}}}' />

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070816;
      color: #f8fafc;
      --panel: rgba(13, 18, 38, .78);
      --line: rgba(255, 255, 255, .12);
      --muted: #9aa4bd;
      --cyan: #55e7ff;
      --pink: #ff5bd7;
      --gold: #ffd166;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 16% 8%, rgba(85, 231, 255, .28), transparent 20rem),
        radial-gradient(circle at 85% 20%, rgba(255, 91, 215, .22), transparent 22rem),
        radial-gradient(circle at 50% 115%, rgba(124, 58, 237, .32), transparent 28rem),
        linear-gradient(145deg, #070816 0%, #10152c 54%, #050711 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      animation: gridDrift 14s linear infinite;
    }

    button, input { font: inherit; }

    .app-shell {
      width: min(100%, 1120px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: .82fr 1.18fr;
      gap: 18px;
      align-items: center;
    }

    .hero-panel, .control-card, .preview-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14, 20, 44, .88), rgba(8, 11, 25, .72));
      box-shadow: 0 24px 90px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
    }

    .hero-panel {
      min-height: 640px;
      border-radius: 32px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
      animation: riseIn .55s ease both;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -92px;
      bottom: -80px;
      background: conic-gradient(from 120deg, var(--cyan), var(--pink), var(--gold), var(--cyan));
      filter: blur(34px);
      opacity: .28;
      animation: spin 8s linear infinite;
    }

    .topbar { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .brand-mark {
      width: 42px; height: 42px; display: grid; place-items: center;
      border-radius: 15px;
      color: #06111f;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      box-shadow: 0 12px 32px rgba(85, 231, 255, .22);
      font-weight: 950;
    }
    .topbar strong { display: block; font-size: 15px; }
    .topbar span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .icon-btn { margin-left: auto; width: 42px; height: 42px; border-radius: 15px; }

    .hero-copy { position: relative; z-index: 1; }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border: 1px solid rgba(85, 231, 255, .28);
      border-radius: 999px;
      color: #a5f3fc;
      background: rgba(8, 145, 178, .12);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 14px;
      font-size: clamp(42px, 7vw, 78px);
      line-height: .86;
      letter-spacing: -.075em;
    }
    p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.65; max-width: 34rem; }

    .hero-hint {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      position: relative;
      z-index: 1;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      background: rgba(255,255,255,.055);
    }
    .hero-hint span {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: #08111f;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      font-size: 11px;
      font-weight: 950;
    }
    .hero-hint strong { align-self: center; font-size: 13px; letter-spacing: -.01em; }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      color: #f8fafc;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    button:active { transform: translateY(1px) scale(.99); }
    .ghost-btn, .icon-btn {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
    }
    .ghost-btn:hover, .icon-btn:hover { transform: translateY(-1px); border-color: rgba(85, 231, 255, .34); }

    .workspace { display: grid; grid-template-columns: 1fr .9fr; gap: 18px; align-items: stretch; }
    .preview-card {
      min-height: 640px;
      border-radius: 34px;
      padding: 22px;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      animation: riseIn .65s ease .08s both;
    }
    .preview-card::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: conic-gradient(from 0deg, transparent, rgba(85,231,255,.18), transparent, rgba(255,91,215,.16), transparent);
      animation: spin 10s linear infinite;
    }
    .nft-orbit { position: absolute; inset: 0; pointer-events: none; }
    .nft-orbit span {
      position: absolute;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
      animation: floatDot 5s ease-in-out infinite;
    }
    .nft-orbit span:nth-child(1) { left: 18%; top: 18%; }
    .nft-orbit span:nth-child(2) { right: 14%; top: 30%; animation-delay: .9s; background: var(--pink); box-shadow: 0 0 18px var(--pink); }
    .nft-orbit span:nth-child(3) { left: 34%; bottom: 14%; animation-delay: 1.6s; background: var(--gold); box-shadow: 0 0 18px var(--gold); }

    .nft-frame {
      width: min(100%, 390px);
      aspect-ratio: 3 / 4.15;
      border-radius: 30px;
      padding: 22px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.04)),
        radial-gradient(circle at 30% 22%, rgba(85,231,255,.30), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(255,91,215,.28), transparent 36%),
        #11172e;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 32px 80px rgba(0,0,0,.48), 0 0 60px rgba(85,231,255,.16);
      transform: perspective(900px) rotateY(-7deg) rotateX(5deg);
      animation: cardFloat 4.8s ease-in-out infinite;
    }
    .nft-topline, .nft-footer { display: flex; justify-content: space-between; gap: 12px; }
    .nft-topline span {
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(0,0,0,.22);
      color: #dffbff;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .08em;
    }
    .quote-mark { font-size: 120px; line-height: .4; color: rgba(255,255,255,.16); font-weight: 950; margin-top: 40px; }
    .cast-quote { color: #fff; font-size: clamp(21px, 4vw, 30px); line-height: 1.15; font-weight: 950; letter-spacing: -.04em; }
    .nft-footer > div { min-width: 0; }
    small { display: block; color: #b8c0d8; font-size: 11px; margin-bottom: 4px; }
    .nft-footer strong { display: block; overflow: hidden; text-overflow: ellipsis; }

    .control-card {
      border-radius: 28px;
      padding: 18px;
      animation: riseIn .7s ease .13s both;
    }
    label { display: grid; gap: 8px; margin-bottom: 12px; }
    label span { color: #d7dded; font-size: 12px; font-weight: 850; }
    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 16px;
      color: #f8fafc;
      background: rgba(255,255,255,.06);
      padding: 13px 14px;
      outline: 0;
    }
    input:focus { border-color: rgba(85, 231, 255, .55); box-shadow: 0 0 0 4px rgba(85,231,255,.08); }
    .primary-btn {
      width: 100%;
      color: #08111f;
      background: linear-gradient(135deg, var(--cyan), #a78bfa 52%, var(--pink));
      box-shadow: 0 16px 36px rgba(85,231,255,.24);
      margin-top: 4px;
    }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 20px 42px rgba(255,91,215,.22); }
    .mint-btn {
      width: 100%;
      margin-top: 10px;
      color: #130c02;
      background: linear-gradient(135deg, #ffe08a, var(--gold));
    }
    .metadata-panel { display: grid; gap: 8px; margin-top: 14px; }
    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.05);
      padding: 10px 12px;
      font-size: 12px;
    }
    .meta-row span { color: var(--muted); }
    .meta-row strong { text-align: right; overflow-wrap: anywhere; }
    .status {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 15px;
      color: #c7f9ff;
      background: rgba(8, 145, 178, .12);
      border: 1px solid rgba(85, 231, 255, .16);
      font-size: 12px;
      line-height: 1.45;
    }

    @keyframes riseIn { from { opacity: 0; transform: translateY(18px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gridDrift { to { background-position: 38px 38px; } }
    @keyframes cardFloat { 0%, 100% { transform: perspective(900px) rotateY(-7deg) rotateX(5deg) translateY(0); } 50% { transform: perspective(900px) rotateY(6deg) rotateX(2deg) translateY(-10px); } }
    @keyframes floatDot { 0%, 100% { transform: translateY(0) scale(1); opacity: .7; } 50% { transform: translateY(-18px) scale(1.35); opacity: 1; } }

    @media (max-width: 920px) {
      .app-shell { grid-template-columns: 1fr; padding: 14px; }
      .hero-panel { min-height: auto; gap: 42px; }
      .workspace { grid-template-columns: 1fr; }
      .preview-card { min-height: 520px; }
    }
    @media (max-width: 520px) {
      .app-shell { padding: 10px; }
      .hero-panel, .preview-card, .control-card { border-radius: 24px; }
      .preview-card { min-height: 500px; padding: 14px; }
      .nft-frame { width: min(100%, 330px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="app-shell">
      <section class="hero-panel">
        <div class="badge">Loading CastMint…</div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
