<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CastPoster</title>
  <meta name="description" content="Compose casts from a clean Farcaster Mini App.">
  <meta property="og:title" content="CastPoster">
  <meta property="og:description" content="Compose casts from a clean Farcaster Mini App.">
  <meta property="og:image" content="https://castposter.vercel.app/og.png?v=2">

  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=2","button":{"title":"Open CastPoster","action":{"type":"launch_frame","name":"CastPoster","url":"https://castposter.vercel.app/?v=2","splashImageUrl":"https://castposter.vercel.app/icon.png?v=2","splashBackgroundColor":"#0f172a"}}}' />
  <meta name="fc:frame" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=2","button":{"title":"Open CastPoster","action":{"type":"launch_frame","name":"CastPoster","url":"https://castposter.vercel.app/?v=2","splashImageUrl":"https://castposter.vercel.app/icon.png?v=2","splashBackgroundColor":"#0f172a"}}}' />

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 15%, rgba(59, 130, 246, .28), transparent 26rem),
        radial-gradient(circle at 85% 0%, rgba(168, 85, 247, .24), transparent 24rem),
        linear-gradient(145deg, #020617 0%, #0f172a 100%);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hero-card {
      width: min(100%, 440px);
      padding: 28px;
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(15, 23, 42, .92), rgba(15, 23, 42, .72));
      box-shadow: 0 24px 80px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
      animation: cardIn .5s ease both;
    }

    .badge {
      display: inline-flex;
      padding: 7px 11px;
      border: 1px solid rgba(96, 165, 250, .28);
      border-radius: 999px;
      color: #93c5fd;
      background: rgba(37, 99, 235, .12);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 11vw, 54px);
      line-height: .95;
      letter-spacing: -.06em;
    }

    p {
      margin: 0 0 22px;
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:active { transform: translateY(1px) scale(.99); }

    .primary-btn {
      color: #06111f;
      background: linear-gradient(135deg, #60a5fa, #a78bfa 55%, #f0abfc);
      box-shadow: 0 14px 32px rgba(96, 165, 250, .28);
    }

    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 18px 40px rgba(167, 139, 250, .32); }

    .ghost-btn {
      margin-top: 10px;
      color: #cbd5e1;
      background: rgba(148, 163, 184, .08);
      border: 1px solid rgba(148, 163, 184, .14);
    }

    .ghost-btn:hover { background: rgba(148, 163, 184, .12); }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      color: #bfdbfe;
      background: rgba(37, 99, 235, .10);
      border: 1px solid rgba(96, 165, 250, .14);
      font-size: 13px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="shell">
      <section class="hero-card">
        <div class="badge">Farcaster Mini App</div>
        <h1>CastPoster</h1>
        <p>Loading Farcaster SDK…</p>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
