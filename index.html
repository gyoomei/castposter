  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg-deep: #02040a;
      --bg-mid: #0a0f1e;
      --bg-elevated: rgba(12, 18, 36, .82);
      --line: rgba(255, 255, 255, .10);
      --line-strong: rgba(255, 255, 255, .18);
      --muted: #6b7a9e;
      --cyan: #00f0ff;
      --cyan-dim: rgba(0, 240, 255, .15);
      --pink: #ff2d95;
      --pink-dim: rgba(255, 45, 149, .12);
      --gold: #ffd166;
      --gold-dim: rgba(255, 209, 102, .12);
      --purple: #a855f7;
      --text: #f0f4ff;
      --text-secondary: #8b9bb4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg-deep);
      color: var(--text);
      position: relative;
    }

    /* Animated mesh gradient background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(0, 240, 255, .12), transparent 60%),
        radial-gradient(ellipse 70% 70% at 90% 10%, rgba(255, 45, 149, .10), transparent 55%),
        radial-gradient(ellipse 60% 50% at 50% 90%, rgba(168, 85, 247, .14), transparent 50%),
        radial-gradient(ellipse 50% 40% at 70% 60%, rgba(255, 209, 102, .06), transparent 45%);
      animation: bgPulse 12s ease-in-out infinite alternate;
    }

    /* Grid overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, .025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at 50% 40%, black 20%, transparent 70%);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particles span {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-dim);
      animation: particleFloat 20s linear infinite;
      opacity: 0;
    }
    .particles span:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 18s; }
    .particles span:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 22s; background: var(--pink); box-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink-dim); }
    .particles span:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 16s; }
    .particles span:nth-child(4) { left: 55%; animation-delay: 1s; animation-duration: 25s; background: var(--gold); box-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold-dim); }
    .particles span:nth-child(5) { left: 70%; animation-delay: 6s; animation-duration: 20s; background: var(--purple); box-shadow: 0 0 10px var(--purple); }
    .particles span:nth-child(6) { left: 85%; animation-delay: 3s; animation-duration: 24s; }
    .particles span:nth-child(7) { left: 15%; animation-delay: 8s; animation-duration: 19s; background: var(--pink); }
    .particles span:nth-child(8) { left: 90%; animation-delay: 5s; animation-duration: 21s; background: var(--gold); }

    button, input { font: inherit; }

    /* Main layout */
    .app-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 1200px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    /* Glass panel base */
    .glass-panel {
      background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: 28px;
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      box-shadow:
        0 32px 80px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,.04) inset,
        inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,240,255,.3), transparent 40%, rgba(255,45,149,.2) 70%, rgba(255,209,102,.15));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: .7;
    }

    /* Hero panel */
    .hero-panel {
      min-height: 720px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: riseIn .6s cubic-bezier(.22, 1, .36, 1) both;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      right: -120px;
      bottom: -100px;
      background: conic-gradient(from 180deg, var(--cyan), var(--pink), var(--gold), var(--purple), var(--cyan));
      filter: blur(50px);
      opacity: .18;
      animation: spin 12s linear infinite;
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .brand-mark {
      width: 44px; height: 44px;
      display: grid; place-items: center;
      border-radius: 14px;
      font-size: 20px;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      box-shadow: 0 8px 32px rgba(0, 240, 255, .3), 0 0 0 1px rgba(255,255,255,.1) inset;
      color: #000;
      font-weight: 900;
    }
    .topbar strong {
      display: block;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .icon-btn {
      margin-left: auto;
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--text);
      display: grid; place-items: center;
      cursor: pointer;
      transition: all .2s ease;
      font-size: 18px;
    }
    .icon-btn:hover {
      border-color: rgba(0,240,255,.4);
      background: rgba(0,240,255,.08);
      transform: translateY(-1px);
    }

    /* Hero copy */
    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 20px 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid rgba(0, 240, 255, .25);
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(0, 240, 255, .08);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(36px, 5.5vw, 68px);
      line-height: .92;
      letter-spacing: -.05em;
      font-weight: 950;
      background: linear-gradient(135deg, #fff 30%, #a5b4fc 60%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-copy p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
      max-width: 400px;
      font-weight: 500;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 28px;
      position: relative;
      z-index: 1;
      padding-top: 16px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat strong {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #fff, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* Workspace */
    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    /* Preview card */
    .preview-card {
      min-height: 420px;
      padding: 28px;
      display: grid;
      place-items: center;
      position: relative;
      animation: riseIn .7s cubic-bezier(.22, 1, .36, 1) .08s both;
    }

    .preview-card::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: conic-gradient(from 0deg, transparent, rgba(0,240,255,.15), transparent, rgba(255,45,149,.12), transparent, rgba(168,85,247,.08), transparent);
      animation: spin 14s linear infinite;
      opacity: .6;
    }

    /* NFT Frame */
    .nft-frame {
      width: min(100%, 360px);
      aspect-ratio: 3 / 4;
      border-radius: 28px;
      padding: 24px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(165deg, rgba(255,255,255,.12), rgba(255,255,255,.03) 55%, rgba(255,255,255,.06)),
        radial-gradient(circle at 25% 20%, rgba(0,240,255,.3), transparent 45%),
        radial-gradient(circle at 80% 75%, rgba(255,45,149,.25), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(168,85,247,.12), transparent 55%),
        #0c1020;
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 40px 100px rgba(0,0,0,.55),
        0 0 80px rgba(0,240,255,.12),
        inset 0 1px 0 rgba(255,255,255,.15);
      transform: perspective(1000px) rotateY(-5deg) rotateX(3deg);
      animation: cardFloat 5s ease-in-out infinite;
      overflow: hidden;
    }

    .nft-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1.5px;
      background: linear-gradient(135deg, rgba(0,240,255,.6), rgba(255,45,149,.5) 45%, rgba(255,209,102,.4) 75%, rgba(168,85,247,.35));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .nft-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,.1) 48%, transparent 58%);
      animation: shimmer 4s ease-in-out infinite;
      pointer-events: none;
    }

    .nft-topline, .nft-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .nft-topline span {
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(0,0,0,.4);
      color: #e0fdff;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .1em;
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
    }
    .quote-mark {
      font-size: 100px;
      line-height: .3;
      color: rgba(255,255,255,.12);
      font-weight: 900;
      margin-top: 30px;
      position: relative;
      z-index: 1;
    }
    .cast-quote {
      color: #fff;
      font-size: clamp(18px, 3vw, 26px);
      line-height: 1.2;
      font-weight: 950;
      letter-spacing: -.03em;
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,.3);
    }
    .nft-footer > div { min-width: 0; }
    .nft-footer small {
      display: block;
      color: #8b9bb4;
      font-size: 10px;
      margin-bottom: 3px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .nft-footer strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      color: #e0f0ff;
    }

    /* Orbit dots */
    .nft-orbit {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .nft-orbit span {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 16px var(--cyan), 0 0 32px var(--cyan-dim);
      animation: floatDot 4s ease-in-out infinite;
    }
    .nft-orbit span:nth-child(1) { left: 16%; top: 16%; }
    .nft-orbit span:nth-child(2) { right: 12%; top: 28%; animation-delay: .8s; background: var(--pink); box-shadow: 0 0 16px var(--pink), 0 0 32px var(--pink-dim); }
    .nft-orbit span:nth-child(3) { left: 30%; bottom: 12%; animation-delay: 1.6s; background: var(--gold); box-shadow: 0 0 16px var(--gold), 0 0 32px var(--gold-dim); }

    /* Control card */
    .control-card {
      padding: 24px;
      animation: riseIn .75s cubic-bezier(.22, 1, .36, 1) .12s both;
    }
    .control-card > * { position: relative; z-index: 1; }

    .section-label {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    label { display: grid; gap: 8px; margin-bottom: 14px; }
    label span {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      background: rgba(255,255,255,.04);
      padding: 14px 16px;
      outline: 0;
      font-size: 14px;
      font-weight: 500;
      transition: all .2s ease;
    }
    input::placeholder { color: rgba(139, 155, 180, .5); }
    input:focus {
      border-color: rgba(0, 240, 255, .5);
      background: rgba(0, 240, 255, .04);
      box-shadow: 0 0 0 4px rgba(0,240,255,.06), 0 0 20px rgba(0,240,255,.08);
    }

    /* Buttons */
    button {
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      color: var(--text);
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s cubic-bezier(.22, 1, .36, 1);
      letter-spacing: .02em;
    }
    button:active { transform: translateY(1px) scale(.99); }

    .primary-btn {
      width: 100%;
      color: #000;
      background: linear-gradient(135deg, var(--cyan), #7c3aed 52%, var(--pink));
      box-shadow: 0 12px 40px rgba(0,240,255,.25), 0 0 0 1px rgba(255,255,255,.15) inset;
      position: relative;
      overflow: hidden;
    }
    .primary-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 50px rgba(0,240,255,.35), 0 0 0 1px rgba(255,255,255,.2) inset;
    }
    .primary-btn:hover::before { transform: translateX(100%); }

    .mint-btn {
      width: 100%;
      margin-top: 12px;
      color: #000;
      background: linear-gradient(135deg, #ffe08a, var(--gold) 60%, #ff9f43);
      box-shadow: 0 12px 40px rgba(255, 209, 102, .2), 0 0 0 1px rgba(255,255,255,.15) inset;
      position: relative;
      overflow: hidden;
    }
    .mint-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .mint-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 50px rgba(255, 209, 102, .3), 0 0 0 1px rgba(255,255,255,.2) inset;
    }
    .mint-btn:hover::before { transform: translateX(100%); }

    .share-btn {
      width: 100%;
      margin-top: 12px;
      color: #000;
      background: linear-gradient(135deg, #a5f3fc, #a78bfa 50%, #f0abfc);
      box-shadow: 0 12px 40px rgba(167, 139, 250, .25), 0 0 0 1px rgba(255,255,255,.15) inset;
      animation: popIn .35s ease both, pulseGlow 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .share-btn[hidden] { display: none; }
    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 50px rgba(167, 139, 250, .35), 0 0 0 1px rgba(255,255,255,.2) inset;
    }

    .mini-profile {
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 16px;
      color: #a5f3fc;
      background: rgba(0, 240, 255, .06);
      border: 1px solid rgba(0, 240, 255, .14);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mini-profile::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    .style-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0;
    }
    .style-chip {
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      text-align: left;
      cursor: pointer;
      transition: all .2s ease;
      color: var(--text);
    }
    .style-chip:hover { border-color: rgba(0,240,255,.25); background: rgba(0,240,255,.04); transform: translateY(-1px); }
    .style-chip.active {
      border-color: rgba(0,240,255,.5);
      background: rgba(0,240,255,.08);
      box-shadow: 0 0 0 3px rgba(0,240,255,.06), 0 4px 20px rgba(0,240,255,.1);
    }
    .style-chip strong { display: block; font-size: 12px; font-weight: 800; }
    .style-chip span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; line-height: 1.2; font-weight: 500; }

    /* Success & History */
    .success-card, .history-card {
      margin-top: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      position: relative;
      overflow: hidden;
    }
    .success-card::before, .history-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), var(--gold), transparent);
      opacity: .6;
    }
    .success-card[hidden] { display: none; }
    .success-kicker, .section-title {
      color: var(--gold);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .success-kicker::before {
      content: "✦";
      color: var(--cyan);
    }
    .success-card h2 { margin: 10px 0 6px; font-size: 20px; letter-spacing: -.02em; font-weight: 900; }
    .success-card p { font-size: 12px; line-height: 1.4; color: var(--text-secondary); }
    .success-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .mini-link {
      display: grid;
      place-items: center;
      min-height: 42px;
      border: 1px solid rgba(0,240,255,.2);
      border-radius: 14px;
      color: #e0fdff;
      background: rgba(0,240,255,.08);
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;
      transition: all .2s ease;
      cursor: pointer;
    }
    .mini-link:hover {
      border-color: rgba(0,240,255,.4);
      background: rgba(0,240,255,.14);
      transform: translateY(-1px);
    }
    .mini-link.subtle {
      grid-column: 1 / -1;
      color: var(--text-secondary);
      background: rgba(255,255,255,.04);
      border-color: var(--line);
    }
