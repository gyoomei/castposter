<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>CastMint — Cast to NFT</title>
  <meta name="description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:title" content="CastMint — Cast to NFT">
  <meta property="og:description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">

  <meta name="fc:frame" content='{"version":"1","imageUrl":"https://castposter.sayligood123.workers.dev/api/share-card?v=19","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://castposter.sayligood123.workers.dev/?v=19","splashImageUrl":"https://castposter.sayligood123.workers.dev/icon.png?v=19","splashBackgroundColor":"#02040a"}}}' />

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      --bg-deep: #02040a;
      --surface: rgba(255, 255, 255, .055);
      --surface-elevated: rgba(255, 255, 255, .09);
      --border: rgba(255, 255, 255, .12);
      --text: #ffffff;
      --text-secondary: #9aa4bd;
      --cyan: #55e7ff;
      --cyan-soft: rgba(85, 231, 255, .18);
      --pink: #ff5bd7;
      --pink-soft: rgba(255, 91, 215, .14);
      --gold: #ffd166;
      --purple: #7c3aed;
      --success: #00d084;
      --radius: 28px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    body {
      background: var(--bg-deep);
      color: var(--text);
      touch-action: pan-y;
      font-size: 16px;
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 8% 12%, rgba(85, 231, 255, .18), transparent 60%),
        radial-gradient(ellipse 70% 70% at 94% 8%, rgba(255, 91, 215, .15), transparent 56%),
        radial-gradient(ellipse 70% 52% at 50% 92%, rgba(124, 58, 237, .20), transparent 55%),
        linear-gradient(180deg, rgba(2,4,10,.20), rgba(2,4,10,1));
      animation: bgPulse 12s ease-in-out infinite alternate;
    }
    body::after {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(85, 231, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(85, 231, 255, .035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at 50% 35%, black 16%, transparent 72%);
    }

    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      gap: 16px;
      max-width: 460px;
      margin: 0 auto;
    }

    .app::before, .app::after {
      content: "";
      position: fixed;
      width: 4px; height: 4px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 16px var(--cyan), 86px 170px 0 rgba(255,91,215,.65), 220px 72px 0 rgba(255,209,102,.75), 310px 260px 0 rgba(85,231,255,.45), 34px 520px 0 rgba(124,58,237,.8);
      opacity: .55;
      animation: particleFloat 16s linear infinite;
      pointer-events: none;
    }
    .app::after { animation-delay: -7s; left: 44%; opacity: .38; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0 2px; }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 14px;
      background: conic-gradient(from 180deg, var(--cyan), var(--pink), var(--gold), var(--purple), var(--cyan));
      display: grid; place-items: center;
      font-size: 18px; font-weight: 900;
      color: #02040a;
      box-shadow: 0 12px 34px rgba(85,231,255,.22);
    }
    .brand-text { font-size: 20px; font-weight: 900; letter-spacing: -.04em; }
    .close-btn {
      width: 38px; height: 38px; border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.055);
      color: var(--text-secondary);
      display: grid; place-items: center;
      font-size: 22px; cursor: pointer;
      backdrop-filter: blur(18px);
      transition: all .2s;
    }
    .close-btn:active { transform: scale(.95); background: var(--surface-elevated); }

    .hero { text-align: center; padding: 20px 0 10px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 13px; border-radius: 999px;
      background: rgba(85, 231, 255, .10);
      border: 1px solid rgba(85, 231, 255, .25);
      color: var(--cyan);
      font-size: 12px; font-weight: 800; letter-spacing: .06em;
      margin-bottom: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .hero-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 14px var(--cyan); animation: pulse 2s ease-in-out infinite; }
    h1 {
      font-size: clamp(34px, 10vw, 48px);
      font-weight: 950;
      line-height: .96;
      letter-spacing: -.07em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 28%, #dffbff 52%, var(--cyan) 78%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-desc { color: var(--text-secondary); font-size: 15px; line-height: 1.5; max-width: 330px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
    .stat {
      padding: 13px 10px; border-radius: 18px;
      background: linear-gradient(160deg, rgba(255,255,255,.065), rgba(255,255,255,.025));
      border: 1px solid rgba(255,255,255,.10);
      text-align: center; backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .stat-value { display: block; font-size: 18px; font-weight: 950; margin-bottom: 2px; }
    .stat-label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .09em; font-weight: 800; }

    .preview {
      position: relative;
      aspect-ratio: 3 / 4;
      max-width: 345px;
      width: 100%;
      margin: 0 auto 4px;
      border-radius: 32px;
      padding: 22px;
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(85,231,255,.34), transparent 34%),
        radial-gradient(circle at 88% 18%, rgba(255,91,215,.28), transparent 36%),
        radial-gradient(circle at 58% 92%, rgba(255,209,102,.18), transparent 34%),
        linear-gradient(150deg, rgba(255,255,255,.09), rgba(255,255,255,.025) 38%, rgba(0,0,0,.34));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 34px 90px rgba(0,0,0,.55), 0 0 55px rgba(85,231,255,.12), inset 0 1px 0 rgba(255,255,255,.12);
      transform: perspective(1000px) rotateY(-6deg) rotateX(3deg);
      animation: cardFloat 5.5s ease-in-out infinite;
      transform-style: preserve-3d;
    }
    .preview::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: linear-gradient(135deg, rgba(85,231,255,.85), transparent 34%, rgba(255,91,215,.72) 66%, rgba(255,209,102,.72));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none; z-index: 2;
    }
    .preview::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,.14) 48%, transparent 62%);
      animation: shimmer 4.5s ease-in-out infinite;
      pointer-events: none; z-index: 3;
    }

    .preview[data-style="minimal"] {
      background: linear-gradient(145deg, #f8fafc, #ffffff);
      border-color: rgba(148, 163, 184, .55);
      box-shadow: 0 30px 80px rgba(15,23,42,.28), inset 0 1px 0 rgba(255,255,255,.80);
    }
    .preview[data-style="minimal"]::before { background: linear-gradient(135deg, rgba(14,165,233,.55), rgba(226,232,240,.65), rgba(251,191,36,.40)); }
    .preview[data-style="minimal"]::after { opacity: .18; }
    .preview[data-style="minimal"] .preview-badge,
    .preview[data-style="minimal"] .cast-author { background: rgba(15,23,42,.055); border-color: rgba(15,23,42,.10); color: #334155; }
    .preview[data-style="minimal"] .cast-text,
    .preview[data-style="minimal"] .cast-author-name { color: #0f172a; text-shadow: none; }
    .preview[data-style="minimal"] .cast-author-username,
    .preview[data-style="minimal"] .preview-footer-item,
    .preview[data-style="minimal"] .preview-placeholder { color: #64748b; }
    .preview[data-style="minimal"] .preview-placeholder::before { color: #0ea5e9; text-shadow: 0 0 22px rgba(14,165,233,.28); }

    .preview[data-style="poster"] {
      background: linear-gradient(145deg, #ff4d00 0%, #7c2d12 42%, #050505 100%);
      border-color: rgba(253,224,71,.70);
      box-shadow: 0 38px 92px rgba(124,45,18,.48), 0 0 54px rgba(251,113,133,.22), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .preview[data-style="poster"]::before { background: linear-gradient(135deg, #fde047, transparent 42%, #fb7185); }
    .preview[data-style="poster"] .preview-badge,
    .preview[data-style="poster"] .cast-author { background: rgba(0,0,0,.48); border-color: rgba(253,224,71,.36); }
    .preview[data-style="poster"] .cast-text { font-weight: 950; text-transform: uppercase; letter-spacing: -.055em; text-shadow: 4px 4px 0 rgba(0,0,0,.34); }
    .preview[data-style="poster"] .preview-placeholder::before { color: #fde047; text-shadow: 0 0 26px rgba(253,224,71,.7); }

    .preview-top, .preview-footer, .preview-content { position: relative; z-index: 4; }
    .preview-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .preview-badge {
      padding: 7px 11px; border-radius: 999px;
      background: rgba(0,0,0,.34); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.13);
      font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.88);
    }
    .preview-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; }
    .preview-placeholder { text-align: center; color: var(--text-secondary); font-size: 14px; max-width: 220px; }
    .preview-placeholder::before { content: "✦"; display: block; font-size: 46px; color: var(--cyan); text-shadow: 0 0 28px var(--cyan); margin-bottom: 12px; }
    .preview-cast { width: 100%; }
    .cast-text {
      font-size: clamp(17px, 5.2vw, 23px);
      line-height: 1.18;
      margin-bottom: 18px;
      color: var(--text);
      font-weight: 900;
      letter-spacing: -.04em;
      text-shadow: 0 3px 28px rgba(0,0,0,.50);
      display: -webkit-box;
      -webkit-line-clamp: 9;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cast-author {
      display: flex; align-items: center; gap: 11px;
      padding: 12px; border-radius: 18px;
      background: rgba(0,0,0,.34);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
    }
    .cast-avatar { width: 34px; height: 34px; border-radius: 50%; background: conic-gradient(from 120deg, var(--cyan), var(--pink), var(--gold), var(--cyan)); box-shadow: 0 0 22px rgba(85,231,255,.22); }
    .cast-author-info { flex: 1; min-width: 0; }
    .cast-author-name { font-size: 14px; font-weight: 850; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cast-author-username { font-size: 12px; color: var(--text-secondary); display: block; }
    .preview-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 13px; border-top: 1px solid rgba(255,255,255,.09); }
    .preview-footer-item { font-size: 10px; color: var(--text-secondary); font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }

    .form-section { display: flex; flex-direction: column; gap: 14px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-label { font-size: 12px; font-weight: 850; color: var(--text-secondary); letter-spacing: .06em; text-transform: uppercase; }
    input, select {
      width: 100%; padding: 15px 16px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.06);
      color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; transition: all .2s; -webkit-appearance: none;
      backdrop-filter: blur(18px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07);
    }
    input:focus, select:focus { border-color: rgba(85,231,255,.65); background: rgba(255,255,255,.09); box-shadow: 0 0 0 4px rgba(85,231,255,.10), inset 0 1px 0 rgba(255,255,255,.09); }
    input::placeholder { color: var(--text-secondary); opacity: .65; }

    button {
      width: 100%; padding: 16px; border-radius: 18px; border: none;
      font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer;
      transition: all .2s; position: relative; overflow: hidden;
    }
    button:active { transform: scale(.98); }
    .btn-primary {
      color: #02040a;
      background: linear-gradient(135deg, var(--cyan), #a78bfa 48%, var(--pink));
      box-shadow: 0 16px 42px rgba(85,231,255,.22);
    }
    .btn-primary::before, .btn-success::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      transform: translateX(-110%); transition: transform .55s ease;
    }
    .btn-primary:active::before, .btn-success:active::before { transform: translateX(110%); }
    .btn-secondary { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(18px); }
    .btn-success { background: linear-gradient(135deg, var(--success), var(--gold)); color: #02040a; box-shadow: 0 16px 42px rgba(0,208,132,.22); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .profile-info {
      padding: 12px 15px; border-radius: 18px;
      background: rgba(85,231,255,.08); border: 1px solid rgba(85,231,255,.20);
      font-size: 13px; color: var(--cyan); font-weight: 800;
      display: flex; align-items: center; gap: 8px;
    }
    .profile-info::before { content: "✓"; width: 19px; height: 19px; border-radius: 50%; background: var(--cyan); color: #02040a; display: grid; place-items: center; font-size: 11px; font-weight: 950; }

    .style-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .style-option {
      aspect-ratio: 1.45; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      cursor: pointer; transition: all .2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      font-size: 23px; position: relative; backdrop-filter: blur(18px);
    }
    .style-option span { font-size: 10px; font-weight: 900; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .07em; }
    .style-option.active { border-color: rgba(85,231,255,.75); background: rgba(85,231,255,.10); box-shadow: 0 0 26px rgba(85,231,255,.12); }
    .style-option.active::after { content: "✓"; position: absolute; top: 7px; right: 7px; width: 19px; height: 19px; border-radius: 50%; background: var(--cyan); color: #02040a; font-size: 11px; display: grid; place-items: center; font-weight: 950; }
    .success-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }

    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .55; transform: scale(.9); } }
    @keyframes bgPulse { 0% { opacity: .8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.025); } }
    @keyframes particleFloat { 0% { transform: translateY(110vh) scale(.6); opacity: 0; } 12% { opacity: .55; } 88% { opacity: .55; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
    @keyframes cardFloat { 0%, 100% { transform: perspective(1000px) rotateY(-6deg) rotateX(3deg) translateY(0); } 50% { transform: perspective(1000px) rotateY(4deg) rotateX(1deg) translateY(-9px); } }
    @keyframes shimmer { 0% { transform: translateX(-130%) skewX(-10deg); } 100% { transform: translateX(130%) skewX(-10deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn .3s ease; }
    .loading { pointer-events: none; opacity: .72; }
    [hidden] { display: none !important; }
    .mt-auto { margin-top: auto; }

    @media (max-width: 420px) {
      .app { padding: 14px; gap: 13px; }
      .hero { padding-top: 14px; }
      .preview { max-width: 318px; border-radius: 28px; transform: perspective(900px) rotateY(-3deg) rotateX(2deg); }
      @keyframes cardFloat { 0%, 100% { transform: perspective(900px) rotateY(-3deg) rotateX(2deg) translateY(0); } 50% { transform: perspective(900px) rotateY(2deg) rotateX(1deg) translateY(-7px); } }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="brand-icon">✦</div>
          <div class="brand-text">CastMint</div>
        </div>
        <button id="closeBtn" class="close-btn" aria-label="Close">×</button>
      </header>

      <section class="hero">
        <div class="hero-badge">Farcaster Mini App</div>
        <h1>Turn Casts into 3D NFTs</h1>
        <p class="hero-desc">Paste a Farcaster URL, generate a premium collectible card, then mint on Base</p>
        
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="mintCount">0</span>
            <span class="stat-label">Minted</span>
          </div>
          <div class="stat">
            <span class="stat-value">Base</span>
            <span class="stat-label">Network</span>
          </div>
          <div class="stat">
            <span class="stat-value">3D</span>
            <span class="stat-label">Card FX</span>
          </div>
        </div>
      </section>

      <div class="preview" id="previewCard">
        <div class="preview-top">
          <div class="preview-badge">Preview</div>
          <div class="preview-badge" id="previewNetwork">Base</div>
        </div>
        <div class="preview-content">
          <div class="preview-placeholder" id="previewPlaceholder">
            Paste a cast URL to generate your holographic NFT preview
          </div>
          <div class="preview-cast" id="previewCast" hidden>
            <div class="cast-text" id="castText"></div>
            <div class="cast-author">
              <div class="cast-avatar" id="castAvatar"></div>
              <div class="cast-author-info">
                <span class="cast-author-name" id="castAuthorName"></span>
                <span class="cast-author-username" id="castAuthorUsername"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="preview-footer">
          <span class="preview-footer-item">Onchain SVG</span>
          <span class="preview-footer-item" id="previewStyle">Neon</span>
        </div>
      </div>

      <form id="castForm" class="form-section mt-auto">
        <div class="input-group">
          <label class="input-label" for="castUrl">Cast URL</label>
          <input 
            id="castUrl" 
            type="url" 
            inputmode="url"
            placeholder="https://warpcast.com/username/0x..." 
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label class="input-label">NFT Style</label>
          <div class="style-picker">
            <div class="style-option active" data-style="neon">
              <div>🎨</div>
              <span>Neon</span>
            </div>
            <div class="style-option" data-style="minimal">
              <div>✨</div>
              <span>Minimal</span>
            </div>
            <div class="style-option" data-style="poster">
              <div>⚡</div>
              <span>Poster</span>
            </div>
          </div>
        </div>

        <div id="profileInfo" class="profile-info" hidden></div>

        <button type="submit" class="btn-primary" id="generateBtn">
          Generate NFT
        </button>

        <button type="button" class="btn-success" id="mintBtn" hidden>
          Mint on Base
        </button>

        <div class="success-actions" id="successActions" hidden>
          <button type="button" class="btn-secondary" id="shareBtn">
            Share Cast NFT
          </button>
          <button type="button" class="btn-secondary" id="newBtn">
            Create Another
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
