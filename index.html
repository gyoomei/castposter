<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>CastMint — Cast to NFT</title>
  <meta name="description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:title" content="CastMint — Cast to NFT">
  <meta property="og:description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:image" content="https://gyoomei.github.io/castposter/og.png?v=16">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://gyoomei.github.io/castposter/">

  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://gyoomei.github.io/castposter/og.png?v=16","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://gyoomei.github.io/castposter/?v=16","splashImageUrl":"https://gyoomei.github.io/castposter/icon.png?v=16","splashBackgroundColor":"#02040a"}}}' />
  <meta name="fc:frame" content='{"version":"1","imageUrl":"https://gyoomei.github.io/castposter/og.png?v=16","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://gyoomei.github.io/castposter/?v=16","splashImageUrl":"https://gyoomei.github.io/castposter/icon.png?v=16","splashBackgroundColor":"#02040a"}}}' />

  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      --bg: #000;
      --surface: #0a0a0a;
      --surface-elevated: #141414;
      --border: rgba(255, 255, 255, .08);
      --text: #fff;
      --text-secondary: #888;
      --accent: #0066ff;
      --accent-glow: rgba(0, 102, 255, .2);
      --success: #00d084;
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    body {
      background: var(--bg);
      color: var(--text);
      touch-action: pan-y;
      font-size: 16px;
      line-height: 1.5;
    }

    /* Subtle gradient background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0, 102, 255, .08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* App container */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #0052cc);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 700;
    }

    .brand-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      display: grid;
      place-items: center;
      font-size: 20px;
      cursor: pointer;
      transition: all .2s;
    }

    .close-btn:active {
      transform: scale(.95);
      background: var(--surface-elevated);
    }

    /* Hero section */
    .hero {
      text-align: center;
      padding: 32px 0 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0, 102, 255, .1);
      border: 1px solid rgba(0, 102, 255, .2);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      margin-bottom: 20px;
    }

    .hero-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero-desc {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .stat {
      flex: 1;
      padding: 16px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }

    /* Preview card */
    .preview {
      position: relative;
      aspect-ratio: 3 / 4;
      max-width: 340px;
      margin: 0 auto;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .preview::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(0, 102, 255, .3), transparent 50%, rgba(0, 102, 255, .1));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .preview-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .preview-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, .1);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .8);
    }

    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .preview-placeholder {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .preview-cast {
      width: 100%;
    }

    .cast-text {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 16px;
      color: var(--text);
    }

    .cast-author {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .cast-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0052cc);
    }

    .cast-author-info {
      flex: 1;
      min-width: 0;
    }

    .cast-author-name {
      font-size: 14px;
      font-weight: 600;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cast-author-username {
      font-size: 12px;
      color: var(--text-secondary);
      display: block;
    }

    .preview-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .preview-footer-item {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      letter-spacing: .02em;
    }

    /* Form section */
    .form-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: .01em;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all .2s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      background: var(--surface-elevated);
    }

    input::placeholder {
      color: var(--text-secondary);
      opacity: .6;
    }

    /* Buttons */
    button {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    button:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:active {
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success {
      background: var(--success);
      color: #000;
      font-weight: 700;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* Profile info */
    .profile-info {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: rgba(0, 102, 255, .08);
      border: 1px solid rgba(0, 102, 255, .15);
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-info::before {
      content: "✓";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
    }

    /* Style picker */
    .style-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .style-option {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 24px;
      position: relative;
    }

    .style-option span {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .style-option.active {
      border-color: var(--accent);
      background: rgba(0, 102, 255, .1);
    }

    .style-option.active::after {
      content: "✓";
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    /* Success actions */
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn .3s ease;
    }

    /* Loading state */
    .loading {
      pointer-events: none;
      opacity: .6;
    }

    .loading::after {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      border-radius: inherit;
    }

    /* Hidden */
    [hidden] {
      display: none !important;
    }

    /* Utility */
    .mt-auto {
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="brand-icon">✦</div>
          <div class="brand-text">CastMint</div>
        </div>
        <button id="closeBtn" class="close-btn" aria-label="Close">×</button>
      </header>

      <section class="hero">
        <div class="hero-badge">Farcaster Mini App</div>
        <h1>Cast to NFT</h1>
        <p class="hero-desc">Paste any Farcaster cast URL and mint it as an NFT on Base</p>
        
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="mintCount">0</span>
            <span class="stat-label">Minted</span>
          </div>
          <div class="stat">
            <span class="stat-value">Base</span>
            <span class="stat-label">Network</span>
          </div>
          <div class="stat">
            <span class="stat-value">Free</span>
            <span class="stat-label">Gas</span>
          </div>
        </div>
      </section>

      <div class="preview" id="previewCard">
        <div class="preview-top">
          <div class="preview-badge">Preview</div>
          <div class="preview-badge" id="previewNetwork">Base</div>
        </div>
        <div class="preview-content">
          <div class="preview-placeholder" id="previewPlaceholder">
            Your cast NFT will appear here
          </div>
          <div class="preview-cast" id="previewCast" hidden>
            <div class="cast-text" id="castText"></div>
            <div class="cast-author">
              <div class="cast-avatar" id="castAvatar"></div>
              <div class="cast-author-info">
                <span class="cast-author-name" id="castAuthorName"></span>
                <span class="cast-author-username" id="castAuthorUsername"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="preview-footer">
          <span class="preview-footer-item">Onchain Metadata</span>
          <span class="preview-footer-item" id="previewStyle">Classic</span>
        </div>
      </div>

      <form id="castForm" class="form-section mt-auto">
        <div class="input-group">
          <label class="input-label" for="castUrl">Cast URL</label>
          <input 
            id="castUrl" 
            type="url" 
            inputmode="url"
            placeholder="https://warpcast.com/username/0x..." 
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label class="input-label">NFT Style</label>
          <div class="style-picker">
            <div class="style-option active" data-style="classic">
              <div>🎨</div>
              <span>Classic</span>
            </div>
            <div class="style-option" data-style="minimal">
              <div>✨</div>
              <span>Minimal</span>
            </div>
            <div class="style-option" data-style="bold">
              <div>⚡</div>
              <span>Bold</span>
            </div>
          </div>
        </div>

        <div id="profileInfo" class="profile-info" hidden></div>

        <button type="submit" class="btn-primary" id="generateBtn">
          Generate NFT
        </button>

        <button type="button" class="btn-success" id="mintBtn" hidden>
          Mint on Base
        </button>

        <div class="success-actions" id="successActions" hidden>
          <button type="button" class="btn-secondary" id="shareBtn">
            Share Cast NFT
          </button>
          <button type="button" class="btn-secondary" id="newBtn">
            Create Another
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
