<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CastMint — Cast to NFT</title>
  <meta name="description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:title" content="CastMint — Cast to NFT">
  <meta property="og:description" content="Turn any Farcaster cast into a collectible NFT concept on Base.">
  <meta property="og:image" content="https://castposter.vercel.app/og.png?v=10">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://castposter.vercel.app/">

  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=10","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://castposter.vercel.app/?v=10","splashImageUrl":"https://castposter.vercel.app/icon.png?v=10","splashBackgroundColor":"#070816"}}}' />
  <meta name="fc:frame" content='{"version":"1","imageUrl":"https://castposter.vercel.app/og.png?v=10","button":{"title":"Create Cast NFT","action":{"type":"launch_frame","name":"CastMint","url":"https://castposter.vercel.app/?v=10","splashImageUrl":"https://castposter.vercel.app/icon.png?v=10","splashBackgroundColor":"#070816"}}}' />

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070816;
      color: #f8fafc;
      --panel: rgba(13, 18, 38, .78);
      --line: rgba(255, 255, 255, .12);
      --muted: #9aa4bd;
      --cyan: #55e7ff;
      --pink: #ff5bd7;
      --gold: #ffd166;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 16% 8%, rgba(85, 231, 255, .28), transparent 20rem),
        radial-gradient(circle at 85% 20%, rgba(255, 91, 215, .22), transparent 22rem),
        radial-gradient(circle at 50% 115%, rgba(124, 58, 237, .32), transparent 28rem),
        linear-gradient(145deg, #070816 0%, #10152c 54%, #050711 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      animation: gridDrift 14s linear infinite;
    }

    button, input { font: inherit; }

    .app-shell {
      width: min(100%, 1120px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: .82fr 1.18fr;
      gap: 18px;
      align-items: center;
    }

    .hero-panel, .control-card, .preview-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14, 20, 44, .88), rgba(8, 11, 25, .72));
      box-shadow: 0 24px 90px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
    }

    .hero-panel {
      min-height: 640px;
      border-radius: 32px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
      animation: riseIn .55s ease both;
    }

    .hero-panel::before,
    .control-card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(85,231,255,.20), transparent 34%, rgba(255,91,215,.16));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      padding: 1px;
      opacity: .82;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -92px;
      bottom: -80px;
      background: conic-gradient(from 120deg, var(--cyan), var(--pink), var(--gold), var(--cyan));
      filter: blur(34px);
      opacity: .28;
      animation: spin 8s linear infinite;
    }

    .topbar { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .brand-mark {
      width: 42px; height: 42px; display: grid; place-items: center;
      border-radius: 15px;
      color: #06111f;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      box-shadow: 0 12px 32px rgba(85, 231, 255, .22);
      font-weight: 950;
    }
    .topbar strong { display: block; font-size: 15px; }
    .topbar span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .icon-btn { margin-left: auto; width: 42px; height: 42px; border-radius: 15px; }

    .hero-copy { position: relative; z-index: 1; }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border: 1px solid rgba(85, 231, 255, .28);
      border-radius: 999px;
      color: #a5f3fc;
      background: rgba(8, 145, 178, .12);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 14px;
      font-size: clamp(42px, 7vw, 78px);
      line-height: .86;
      letter-spacing: -.075em;
    }
    p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.65; max-width: 34rem; }

    .hero-hint {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      position: relative;
      z-index: 1;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      background: rgba(255,255,255,.055);
    }
    .hero-hint span {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: #08111f;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      font-size: 11px;
      font-weight: 950;
    }
    .hero-hint strong { align-self: center; font-size: 13px; letter-spacing: -.01em; }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      color: #f8fafc;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    button:active { transform: translateY(1px) scale(.99); }
    .ghost-btn, .icon-btn {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
    }
    .ghost-btn:hover, .icon-btn:hover { transform: translateY(-1px); border-color: rgba(85, 231, 255, .34); }

    .workspace { display: grid; grid-template-columns: 1fr .9fr; gap: 18px; align-items: stretch; }
    .preview-card {
      min-height: 640px;
      border-radius: 34px;
      padding: 22px;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      animation: riseIn .65s ease .08s both;
    }
    .preview-card::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: conic-gradient(from 0deg, transparent, rgba(85,231,255,.22), transparent, rgba(255,91,215,.20), transparent, rgba(255,209,102,.14), transparent);
      animation: spin 10s linear infinite;
    }
    .nft-orbit { position: absolute; inset: 0; pointer-events: none; }
    .nft-orbit span {
      position: absolute;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
      animation: floatDot 5s ease-in-out infinite;
    }
    .nft-orbit span:nth-child(1) { left: 18%; top: 18%; }
    .nft-orbit span:nth-child(2) { right: 14%; top: 30%; animation-delay: .9s; background: var(--pink); box-shadow: 0 0 18px var(--pink); }
    .nft-orbit span:nth-child(3) { left: 34%; bottom: 14%; animation-delay: 1.6s; background: var(--gold); box-shadow: 0 0 18px var(--gold); }

    .nft-frame {
      width: min(100%, 390px);
      aspect-ratio: 3 / 4.15;
      border-radius: 30px;
      padding: 22px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(160deg, rgba(255,255,255,.18), rgba(255,255,255,.04) 60%, rgba(255,255,255,.08)),
        radial-gradient(circle at 30% 22%, rgba(85,231,255,.35), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(255,91,215,.32), transparent 38%),
        radial-gradient(circle at 50% 50%, rgba(124,58,237,.15), transparent 60%),
        #11172e;
      border: 1.5px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 32px 80px rgba(0,0,0,.48),
        0 0 60px rgba(85,231,255,.16),
        inset 0 1px 0 rgba(255,255,255,.12);
      transform: perspective(900px) rotateY(-7deg) rotateX(5deg);
      animation: cardFloat 4.8s ease-in-out infinite;
      overflow: hidden;
    }
    .nft-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 30px;
      padding: 1.5px;
      background: linear-gradient(135deg, rgba(85,231,255,.65), rgba(255,91,215,.55) 50%, rgba(255,209,102,.45));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .nft-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.08) 50%, transparent 60%);
      animation: shimmer 5s ease-in-out infinite;
      pointer-events: none;
    }
    .nft-topline, .nft-footer { display: flex; justify-content: space-between; gap: 12px; }
    .nft-topline span {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(0,0,0,.35);
      color: #dffbff;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .08em;
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
    }
    .quote-mark { font-size: 120px; line-height: .4; color: rgba(255,255,255,.16); font-weight: 950; margin-top: 40px; }
    .cast-quote { color: #fff; font-size: clamp(21px, 4vw, 30px); line-height: 1.15; font-weight: 950; letter-spacing: -.04em; }
    .nft-footer > div { min-width: 0; }
    small { display: block; color: #b8c0d8; font-size: 11px; margin-bottom: 4px; }
    .nft-footer strong { display: block; overflow: hidden; text-overflow: ellipsis; }

    .control-card {
      border-radius: 28px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      animation: riseIn .7s ease .13s both;
    }
    .control-card > * { position: relative; z-index: 1; }
    .control-card::after {
      content: "";
      position: absolute;
      inset: auto -20% -34% 20%;
      height: 190px;
      background: radial-gradient(circle, rgba(255,209,102,.18), transparent 62%);
      filter: blur(10px);
      pointer-events: none;
    }
    label { display: grid; gap: 8px; margin-bottom: 12px; }
    label span { color: #d7dded; font-size: 12px; font-weight: 850; }
    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 16px;
      color: #f8fafc;
      background: rgba(255,255,255,.06);
      padding: 13px 14px;
      outline: 0;
    }
    input:focus { border-color: rgba(85, 231, 255, .55); box-shadow: 0 0 0 4px rgba(85,231,255,.08); }
    .primary-btn {
      width: 100%;
      color: #08111f;
      background: linear-gradient(135deg, var(--cyan), #a78bfa 52%, var(--pink));
      box-shadow: 0 16px 36px rgba(85,231,255,.24);
      margin-top: 4px;
    }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 20px 42px rgba(255,91,215,.22); }
    .mint-btn {
      width: 100%;
      margin-top: 10px;
      color: #130c02;
      background: linear-gradient(135deg, #ffe08a, var(--gold));
      box-shadow: 0 18px 38px rgba(255, 209, 102, .18);
    }
    .mint-btn:hover { transform: translateY(-1px); box-shadow: 0 22px 48px rgba(255, 209, 102, .24); }
    .share-btn {
      width: 100%;
      margin-top: 10px;
      color: #07111f;
      background: linear-gradient(135deg, #7dd3fc, #c084fc 54%, #f0abfc);
      box-shadow: 0 18px 42px rgba(192, 132, 252, .24);
      animation: popIn .32s ease both, pulseGlow 2.6s ease-in-out infinite;
    }
    .share-btn[hidden] { display: none; }
    .share-btn:hover { transform: translateY(-1px); box-shadow: 0 22px 54px rgba(85, 231, 255, .22); }
    .mini-profile {
      margin: 12px 0;
      padding: 11px 12px;
      border-radius: 15px;
      color: #c7f9ff;
      background: rgba(85, 231, 255, .085);
      border: 1px solid rgba(85, 231, 255, .16);
      font-size: 12px;
      font-weight: 800;
    }
    .style-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
    .style-chip {
      padding: 10px 8px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      text-align: left;
    }
    .style-chip.active { border-color: rgba(85,231,255,.55); box-shadow: 0 0 0 3px rgba(85,231,255,.08); }
    .style-chip strong { display: block; font-size: 12px; }
    .style-chip span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; line-height: 1.2; }
    .add-mini-btn { width: 100%; margin-top: 10px; }
    .success-card, .history-card {
      margin-top: 12px;
      padding: 13px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
    }
    .success-card[hidden] { display: none; }
    .success-kicker, .section-title { color: #ffd166; font-size: 11px; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; }
    .success-card h2 { margin: 7px 0 4px; font-size: 18px; letter-spacing: -.03em; }
    .success-card p { font-size: 12px; line-height: 1.35; }
    .success-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .mini-link {
      display: grid;
      place-items: center;
      min-height: 40px;
      border: 1px solid rgba(85,231,255,.20);
      border-radius: 13px;
      color: #effcff;
      background: rgba(85,231,255,.09);
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;
    }
    .mini-link.subtle { grid-column: 1 / -1; color: #cbd5e1; background: rgba(255,255,255,.055); }
    .poster-preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 14px; margin-top: 12px; border: 1px solid rgba(255,255,255,.14); }
    .history-empty { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .history-list { display: grid; gap: 10px; margin-top: 10px; }
    .history-item {
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
      padding: 14px 16px;
      border: 1.5px solid rgba(85,231,255,.18);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(14,20,44,.92), rgba(8,11,25,.78));
      box-shadow: 0 12px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);
      position: relative; overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .history-item:hover { transform: translateY(-2px); border-color: rgba(85,231,255,.45); box-shadow: 0 16px 48px rgba(85,231,255,.10); }
    .history-item::before {
      content: ""; position: absolute; inset: 0; border-radius: 20px; padding: 1.5px;
      background: linear-gradient(135deg, rgba(85,231,255,.35), transparent 40%, rgba(255,91,215,.25));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .history-item strong { display: block; font-size: 13px; color: #dffbff; }
    .history-item .cast-snippet { display: block; max-width: 210px; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
    .history-item .tx-badge {
      padding: 6px 10px; border-radius: 999px; background: rgba(85,231,255,.10);
      border: 1px solid rgba(85,231,255,.20); color: #7dd3fc; font-size: 10px; font-weight: 900;
      text-decoration: none; transition: background .15s ease;
    }
    .history-item .tx-badge:hover { background: rgba(85,231,255,.20); }
    .history-item .poster-btn {
      width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center;
      border: 1px solid rgba(255,209,102,.25); background: rgba(255,209,102,.10);
      color: #ffd166; font-size: 14px; cursor: pointer; transition: all .15s ease;
    }
    .history-item .poster-btn:hover { background: rgba(255,209,102,.20); transform: scale(1.08); }
    .preview-card.style-poster .nft-frame { transform: perspective(900px) rotateY(0deg) rotateX(0deg); background: linear-gradient(145deg, rgba(255,209,102,.16), rgba(255,91,215,.10)), #10152c; }
    .preview-card.style-minimal .nft-frame { background: linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.025)), #0b1020; box-shadow: 0 32px 80px rgba(0,0,0,.52); }
    .preview-card.style-minimal::before { opacity: .35; }
    .metadata-panel { display: grid; gap: 8px; margin-top: 14px; }
    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.05);
      padding: 10px 12px;
      font-size: 12px;
    }
    .meta-row span { color: var(--muted); }
    .meta-row strong { text-align: right; overflow-wrap: anywhere; }
    .status {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 15px;
      color: #c7f9ff;
      background: rgba(8, 145, 178, .12);
      border: 1px solid rgba(85, 231, 255, .16);
      font-size: 12px;
      line-height: 1.45;
    }

    @keyframes riseIn { from { opacity: 0; transform: translateY(18px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gridDrift { to { background-position: 38px 38px; } }
    @keyframes cardFloat { 0%, 100% { transform: perspective(900px) rotateY(-7deg) rotateX(5deg) translateY(0); } 50% { transform: perspective(900px) rotateY(6deg) rotateX(2deg) translateY(-10px); } }
    @keyframes floatDot { 0%, 100% { transform: translateY(0) scale(1); opacity: .7; } 50% { transform: translateY(-18px) scale(1.35); opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseGlow { 0%, 100% { filter: saturate(1); } 50% { filter: saturate(1.22) brightness(1.05); } }
    @keyframes shimmer { 0% { transform: translateX(-120%) skewX(-12deg); } 100% { transform: translateX(120%) skewX(-12deg); } }

    @media (max-width: 920px) {
      .app-shell { grid-template-columns: 1fr; padding: 14px; }
      .hero-panel { min-height: auto; gap: 42px; }
      .workspace { grid-template-columns: 1fr; }
      .preview-card { min-height: 520px; }
    }
    @media (max-width: 520px) {
      .app-shell { padding: 10px; }
      .hero-panel, .preview-card, .control-card { border-radius: 24px; }
      .preview-card { min-height: 500px; padding: 14px; }
      .nft-frame { width: min(100%, 330px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="app-shell">
      <section class="hero-panel">
        <div class="badge">Loading CastMint…</div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
